<!DOCTYPE html>
  <html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Verification</title>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" 
  defer></script>
    <style>
      body { margin: 0; display: flex; align-items: center; justify-content:
  center; height: 100vh; font-family: -apple-system, sans-serif; background: #000;
  color: #fff; }
      .box { text-align: center; }
      .label { margin-bottom: 16px; font-size: 14px; opacity: 0.7; }
    </style>
  </head>
  <body>
    <div class="box">
      <div class="label">Verifying you're human</div>
      <div id="ts" class="cf-turnstile"></div>
    </div>
    <script>
      (function () {
        var params = new URLSearchParams(window.location.search);
        var siteKey = params.get('sitekey') || '';
        var redirect = params.get('redirect') || 'wuvo://turnstile-callback';
        if (!siteKey) { document.body.innerText = 'Missing site key'; return; }
        function onReady() {
          window.turnstile.render('#ts', {
            sitekey: siteKey,
            callback: function (token) {
              window.location.replace(redirect + '?token=' +
  encodeURIComponent(token));
            },
            'error-callback': function () {
              window.location.replace(redirect + '?error=challenge_failed');
            },
          });
        }
        if (window.turnstile) onReady(); else window.onloadTurnstileCallback =
  onReady;
      })();
    </script>
  </body>
  </html>
